# Deploy Meta API Watch to GitHub Pages
# Triggers: on every push to main (after local analysis + git push)

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'content/**'
      - 'content-learn/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Rebuild site index from content/ articles (in case any drift)
      - name: Rebuild site index
        run: node scripts/publish-article.js --rebuild-only

      # Build Learn section into site/learn/
      - name: Build Learn section
        run: node scripts/build-learn.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
